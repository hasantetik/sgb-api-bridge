version: '3.8'

services:
  app:
    build: .
    container_name: sgb_bridge_app
    ports:
      - "8080:8080"
    environment:
      # Veritabanı bağlantı ayarları (Spring Boot bu değişkenleri otomatik tanır)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sgb_bridge
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: sgb_bridge_db
    environment:
      - POSTGRES_DB=sgb_bridge
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      # Veritabanı tam olarak ayağa kalkmadan Spring Boot'un başlamasını engeller
      test: ["CMD-SHELL", "pg_isready -U postgres -d sgb_bridge"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - sgb-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sgb-db-data:
